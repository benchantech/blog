# Site settings
title: Ben Chan Tech LLC
description: >-
  Ben Chan is an engineer and the creator of the YY Method — a framework for making decisions durable under constraint.
url: "https://benchantech.com"
baseurl: ""

# Build settings
theme: minima
markdown: kramdown
highlighter: rouge
timezone: America/New_York

# Permalinks
permalink: /:categories/:title/

# Header navigation
header_pages: []

# Custom includes
include:
  - _includes/head-custom.html
  - assets/images


# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
